<!DOCTYPE html>
<html>

<head>
  <title>Admin Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>


  <script>
    let role = localStorage.getItem("role");

    if (role !== "admin") {
      alert("Access Denied!");
      window.location.href = "login.html";
    }
  </script>

  <!--<nav class="navbar navbar-expand-lg navbar-dark bg-dark fixed-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">HunarHub</a>
      <div class="navbar-nav ms-auto">
        <a class="nav-link" href="index.html">Home</a>
        <a class="nav-link" href="enterpreneurs.html">Entrepreneurs</a>
        <a class="nav-link" href="login.html">Login</a>-->

  <div class="container mt-5">

    <h2 class="text-center mb-4">Admin Dashboard</h2>

    <div class="row">

      <div class="col-md-6">
        <div class="card p-3 shadow" style="border: 1px solid black;">
          <h4>Total Users</h4>
          <p id="totalUsers">0</p>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card p-3 shadow" style="border: 1px solid black;">
          <h4>Total Requests</h4>
          <p id="totalRequests">0</p>
        </div>
      </div>

    </div>

  </div>

  <script>

    // users
    let users = JSON.parse(localStorage.getItem("users")) || [];
    document.getElementById("totalUsers").innerText = users.length;

    // requests
    let requests = JSON.parse(localStorage.getItem("requests")) || [];
    document.getElementById("totalRequests").innerText = requests.length;

  </script>

  <div class="container mt-5">

    <h3>All Users</h3>

    <table class="table table-bordered" style="border: 1px solid black;">
      <thead>
        <tr>
          <th>Name</th>
          <th>Email</th>
          <th>Role</th>
          <th>Action</th>
        </tr>
      </thead>

      <tbody id="userTable"></tbody>
    </table>

  </div>

  <script>
    let userTable = document.getElementById("userTable");
    if (users.length === 0) {
      userTable.innerHTML = "<tr><td colspan='4'>No Users Found</td></tr>";
    }
    else {
      users.forEach(user => {
        userTable.innerHTML += `
      <tr>
        <td>${user.name}</td>
        <td>${user.email}</td>
        <td>${user.role}</td>
        <td><button onclick="deleteUser('${user.email}')">Delete</button></td>
      </tr>
    `;
      });
    }
  </script>

  <div class="container mt-5">

    <h3>All Requests</h3>

    <table class="table table-striped" style="border: 1px solid black;">
      <thead>
        <tr>
          <th>User</th>
          <th>Product</th>
          <th>Entrepreneur</th>

        </tr>
      </thead>

      <tbody id="requestTable"></tbody>
    </table>

  </div>

  <script>
    let requestTable = document.getElementById("requestTable");

    if (requests.length === 0) {
      requestTable.innerHTML = "<tr><td colspan='3'>No Requests Found</td></tr>";
    }
    else {
      requests.forEach(req => {
        requestTable.innerHTML += `
      <tr>
        <td>${req.user}</td>
        <td>${req.product}</td>
        <td>${req.entrepreneur}</td>
       
      </tr>
    `;
      });
    }
  </script>

  <script>
    function deleteUser(email) {

      let users = JSON.parse(localStorage.getItem("users")) || [];

      let user = users.find(u => u.email === email);

      if (user.role === "admin") {
        alert("Admin cannot be deleted!");
        return;
      }

      let confirmDelete = confirm("Are you sure you want to delete this user?");

      if (!confirmDelete) {
        return;
      }

      users = users.filter(u => u.email !== email);

      localStorage.setItem("users", JSON.stringify(users));

      alert("User Deleted!");

      location.reload();
    }
  </script>
   <div class="text-center mt-4">
  <button onclick="logout()" class="btn btn-danger mb-3" >Logout</button>
  </div>

  <script>
    function logout() {
      localStorage.clear();
      window.location.href = "login.html";
    }
  </script>

</body>
