<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Request Service</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>


  <script src="js/auth.js"></script>
  <script>
    checkLogin();
  </script>

  <div class="container mt-5">

    <div class="card p-4 shadow">

      <h3 class="text-center mb-4">Request Service</h3>

      <!-- Dynamic Data -->
      <p><strong>Product:</strong> <span id="productName"></span></p>
      <p><strong>Entrepreneur:</strong> <span id="entrepreneurName"></span></p>

      <form onsubmit="submitRequest(); return false;">

        <input type="text" id="userName" class="form-control mb-3" placeholder="Your Name" required>

        <input type="tel" id="phone" class="form-control mb-3" placeholder="Phone Number" required>

        <textarea id="address" class="form-control mb-3" placeholder="Your Address" required></textarea>

        <button class="btn btn-warning w-100">Submit Request</button>

      </form>

    </div>

  </div>

  <script>

    if (localStorage.getItem("isLoggedIn") !== "true") {
      window.location.href = "login.html";
    }
    /* URL se data lena */
    const params = new URLSearchParams(window.location.search);

    const product = params.get("product");
    const name = params.get("name");

    /* Page pe show karna */
    document.getElementById("productName").innerText = product;
    document.getElementById("entrepreneurName").innerText = name;

    /* Form submit */
    function submitRequest() {

      let requestData = {
        user: document.getElementById("userName").value,
        phone: document.getElementById("phone").value,
        address: document.getElementById("address").value,
        product: product,
        entrepreneur: name
      };

      /* localStorage me save */
      let requests = JSON.parse(localStorage.getItem("requests")) || [];

      requests.push(requestData);

      localStorage.setItem("requests", JSON.stringify(requests));

      alert("Request Sent Successfully!");

      //  Redirect
      window.location.href = "enterpreneurs.html";

    }
  </script>
</body>

</html>
