<!DOCTYPE html>
<html>
<head>
  <title>Entrepreneur Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body >

<!--  LOGIN + ROLE CHECK -->
<script>
if(localStorage.getItem("isLoggedIn") !== "true"){
  window.location.href = "login.html";
}

if(localStorage.getItem("role") !== "entrepreneur"){
  alert("Access Denied!");
  window.location.href = "login.html";
}
</script>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark">
  <div class="container">
    <span class="navbar-brand">HunarHub</span>

    <div>
      <a href="index.html" class="btn btn-outline-light me-2">Home</a>
      <button onclick="logout()" class="btn btn-danger">Logout</button>
    </div>
  </div>
</nav>

<div class="container mt-5">

  <!-- Welcome -->
  <h2 id="welcomeEntrepreneur" class="text-center mb-4"></h2>

  <!-- Requests Section -->
  <h4 class="text-center">Customer Requests</h4>

  <table class="table table-bordered mt-3 text-center">
    <thead class="table-dark">
      <tr>
        <th>User</th>
        <th>Product</th>
        <th>Phone</th>
        <th>Address</th>
      </tr>
    </thead>

    <tbody id="requestTable"></tbody>
  </table>

</div>

<script>

// current entrepreneur
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(currentUser){
  document.getElementById("welcomeEntrepreneur").innerText = "Welcome " + currentUser.name;
}

// all requests
let requests = JSON.parse(localStorage.getItem("requests")) || [];

let table = document.getElementById("requestTable");

// no requests
if(requests.length === 0){
  table.innerHTML = "<tr><td colspan='4'>No Requests Found</td></tr>";
}
else{

  // sirf us entrepreneur ke requests
  let myRequests = requests.filter(r => r.entrepreneur === currentUser.name);

  if(myRequests.length === 0){
    table.innerHTML = "<tr><td colspan='4'>No Requests Found</td></tr>";
  }
  else{
    myRequests.forEach(req => {
      table.innerHTML += `
        <tr>
          <td>${req.user}</td>
          <td>${req.product}</td>
          <td>${req.phone}</td>
          <td>${req.address}</td>
        </tr>
      `;
    });
  }
}

// logout
function logout(){
  localStorage.clear();
  window.location.href = "login.html";
}

</script>

</body>
</html>
