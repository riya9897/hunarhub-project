<!DOCTYPE html>
<html>

<head>
  <title>Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <select id="role" class="form-control mb-3" required>
    <option value="">Select Role</option>
    <option value="user">User</option>
    <option value="admin">Admin</option>
    <option value="entrepreneur">Entrepreneur</option>
  </select>

  <div class="container mt-5">
    <h2 class="text-center">Register</h2>
    <div class="container my-5 d-flex justify-content-center">
      <div class="card p-4 shadow" style="width: 350px;">
        <form onsubmit="registerUser(); return false;">

          <input class="form-control" type="text" id="name" placeholder="Enter Name" required>
          <input class="form-control" type="email" id="email" placeholder="Enter Email" required>
          <input class="form-control" type="password" id="password" placeholder="Enter Password" required>

          <button type="submit" class="btn btn-success w-100">Register</button>

        </form>
      </div>
    </div>

    <script>
function registerUser() {

  let users = JSON.parse(localStorage.getItem("users")) || [];

  let newUser = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    password: document.getElementById("password").value,
    role: document.getElementById("role").value
  };

  // check duplicate email
  let exists = users.some(u => u.email === newUser.email);

  if(exists){
    alert("User already exists!");
    return;
  }

  users.push(newUser);

  localStorage.setItem("users", JSON.stringify(users));

  alert("Registered Successfully!");

  window.location.href = "login.html";
}
</script>
</body>

</html>
