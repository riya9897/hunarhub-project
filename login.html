<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>

<body>
  <div class="container d-flex justify-content-center align-items-center vh-100">
    <div class="card p-4 shadow" style="width : 350px;">
      <h3 class="text-center mb-3">Login</h3>

      <form onsubmit="loginUser(); return false;">

        <input class="form-control" type="email" id="email" placeholder="Enter Email" required>
        <input class="form-control" type="password" id="password" placeholder="Enter Password" required>

        <button type="submit" class="btn btn-success w-100">Login</button>

      </form>

      <p class="text-center mt-3">
        Don't have an account? <a href="register.html">Register</a>
      </p>

    </div>

  </div>

  <script>
function loginUser() {

  let email = document.getElementById("email").value;
  let password = document.getElementById("password").value;

  let users = JSON.parse(localStorage.getItem("users")) || [];

  // find matching user
  let foundUser = users.find(u => u.email === email && u.password === password);

  if (foundUser) {

    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("role", foundUser.role);
    localStorage.setItem("currentUser", JSON.stringify(foundUser));

    let redirectPage = localStorage.getItem("redirectPage");

    if (redirectPage) {
      localStorage.removeItem("redirectPage");
      window.location.href = redirectPage;
    } else {

      // role based redirect
      if (foundUser.role === "admin") {
        window.location.href = "admin-dashboard.html";
      }
      else if (foundUser.role === "entrepreneur") {
        window.location.href = "entrepreneur-dashboard.html";
      }
      else {
        window.location.href = "user-dashboard.html";
      }

    }

  } else {
    alert("Invalid credentials!");
  }
}
</script>

</body>

</html>
