<!DOCTYPE html>
<html>

<head>
    <title>User Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body >

    <nav class="navbar navbar-dark bg-dark">
        <div class="container">
            <span class="navbar-brand">HunarHub</span>

            <div>
                <a href="index.html" class="btn btn-outline-light me-2">Home</a>
                <button onclick="logout()" class="btn btn-danger">Logout</button>
            </div>
        </div>
    </nav>

    <!-- LOGIN CHECK -->
    <script>
        if (localStorage.getItem("isLoggedIn") !== "true") {
            window.location.href = "login.html";
        }
    </script>

    <div class="container mt-5">

        <!-- Welcome -->
        <h2 id="welcomeUser" class="text-center mb-4"></h2>

        <!-- Logout -->
        <!--<div class="text-end">
            <button onclick="logout()" class="btn btn-danger mb-3">Logout</button>
        </div>-->

        <!-- Requests -->
        <h4 class="text-center">My Requests</h4>

        <table class="table table-bordered mt-3 text-center">
            <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Entrepreneur</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody id="requestTable"></tbody>
        </table>

    </div>

    <script>

        // 👤 current user
        let currentUser = JSON.parse(localStorage.getItem("currentUser"));

        if (currentUser) {
            document.getElementById("welcomeUser").innerText = "Welcome " + currentUser.name;
        }

        //  all requests
        let requests = JSON.parse(localStorage.getItem("requests")) || [];

        let table = document.getElementById("requestTable");

        // ❗ no request
        if (requests.length === 0) {
            table.innerHTML = "<tr><td colspan='3'>No Requests Found</td></tr>";
        }
        else {
            // sirf current user ke requests show karo
            let userRequests = requests.filter(r => r.user === currentUser.name);

            if (userRequests.length === 0) {
                table.innerHTML = "<tr><td colspan='3'>No Requests Found</td></tr>";
            }
            else {
                userRequests.forEach(req => {
                    table.innerHTML += `
        <tr>
          <td>${req.product}</td>
          <td>${req.entrepreneur}</td>
          <td>Pending</td>
        </tr>
      `;
                });
            }
        }

        // logout
        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

    </script>

</body>

</html>
